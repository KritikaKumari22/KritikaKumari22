---
layout: default
---
<article class="page page-card">
  <header class="page-header">
    <p class="eyebrow">{{ page.eyebrow | default: 'Portfolio' }}</p>
    <h1>{{ page.title }}</h1>
    {% if page.subtitle %}<p class="lead">{{ page.subtitle }}</p>{% endif %}
  </header>
  <div class="prose">
    {{ content }}
  </div>
</article>
